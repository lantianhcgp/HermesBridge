name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode keystore
      if: env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > hermesbridge.keystore

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'hermes2024' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'hermesbridge' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'hermes2024' }}
      run: ./gradlew assembleRelease

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HermesBridge-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: HermesBridge v2.5.0 (Build ${{ github.run_number }})
        body: |
          HermesBridge v2.5.0 Release
          
          ### Changes
          - New: Contacts API (search + detail)
          - New: Clipboard API (read/write/clear)
          - New: Alarm API (set/cancel)
          - New: WiFi API (info + scan)
          - New: Service stop/restart API
          - Improved: Location with timeout protection
          - Material 3 UI
          - Signed APK build support
          - Target SDK 35
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
